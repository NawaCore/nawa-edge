name: nawa-edge-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile source
        run: python -m py_compile nawa_edge.py

      - name: Confirm zero third-party dependencies
        shell: bash
        run: |
          if grep -Ev '^[[:space:]]*(#|$)' requirements.txt | grep -q .; then
            echo "Unexpected dependency found in requirements.txt"
            exit 1
          fi

      - name: Run demonstration
        run: python nawa_edge.py --no-serve --out ci_out

      - name: Verify Sovereign Seal
        run: |
          python nawa_edge.py verify ci_out/nawa_edge_seals.jsonl \
            --report ci_out/nawa_edge_report_sealed.json
